<!DOCTYPE html>
<html>
<head>
  <title>Cassino Online</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 40px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: gold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>🎰 Cassino Online</h1>
<p>Saldo: <span id="saldo">100</span></p>

<button onclick="jogar()">Girar Slot</button>

<p id="resultado"></p>

<script>
let saldo = localStorage.getItem("saldo") || 100;
saldo = parseInt(saldo);

document.getElementById("saldo").innerText = saldo;

function jogar() {
  if (saldo <= 0) {
    document.getElementById("resultado").innerText = "Sem saldo!";
    return;
  }

  saldo -= 10;

  let numero = Math.floor(Math.random() * 5);

  if (numero === 1) {
    saldo += 50;
    document.getElementById("resultado").innerText = "🎉 GANHOU!";
  } else {
    document.getElementById("resultado").innerText = "😢 PERDEU!";
  }

  localStorage.setItem("saldo", saldo);

  document.getElementById("saldo").innerText = saldo;
}
</script>
