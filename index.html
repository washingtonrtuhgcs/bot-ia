<!DOCTYPE html>
<html>
<head>
  <title>Cassino Online</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      padding: 12px 25px;
      margin: 5px;
      background: gold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h1>🎰 Cassino Online</h1>

<div id="login">
  <input id="user" placeholder="Usuário">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="cassino" style="display:none;">
  <p>👤 <span id="usuario"></span></p>
  <p>💰 Saldo: <span id="saldo"></span></p>

  <h3>🎰 Slot</h3>
  <button onclick="slot()">Girar</button>

  <h3>🎡 Roleta</h3>
  <button onclick="roleta()">Girar</button>

  <h3>📈 Crash</h3>
  <button onclick="crash()">Jogar</button>

  <p id="resultado"></p>
</div>

<script>
let saldo = 100;
let usuario = "";

function entrar() {
  usuario = document.getElementById("user").value;
  if (!usuario) return;

  localStorage.setItem("usuario", usuario);

  saldo = localStorage.getItem(usuario) || 100;
  saldo = parseFloat(saldo);

  document.getElementById("usuario").innerText = usuario;
  document.getElementById("saldo").innerText = saldo;

  document.getElementById("login").style.display = "none";
  document.getElementById("cassino").style.display = "block";
}

function salvar() {
  localStorage.setItem(usuario, saldo);
  document.getElementById("saldo").innerText = saldo;
}

function enviarTelegram(msg) {
  fetch("/enviar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ msg: msg })
  });
}

function slot() {
  saldo -= 10;
  if (Math.random() < 0.3) {
    saldo += 40;
    resultado("🎉 Slot GANHOU!");
    enviarTelegram("🎉 " + usuario + " ganhou no SLOT! Saldo: " + saldo);
  } else {
    resultado("😢 Slot perdeu");
  }
  salvar();
}

function roleta() {
  saldo -= 10;
  let cor = ["vermelho","preto","verde"][Math.floor(Math.random()*3)];
  if (cor === "verde") {
    saldo += 100;
    resultado("🟢 Verde! GANHOU!");
    enviarTelegram("🎡 " + usuario + " ganhou na ROLETA! Saldo: " + saldo);
  } else {
    resultado("🔴 Perdeu");
  }
  salvar();
}

function crash() {
  saldo -= 10;
  let multi = (Math.random()*5).toFixed(2);

  if (multi > 2) {
    saldo += multi * 10;
    resultado("📈 x" + multi + " GANHOU!");
    enviarTelegram("📈 " + usuario + " ganhou no CRASH x" + multi + "! Saldo: " + saldo);
  } else {
    resultado("💥 Quebrou em x" + multi);
  }
  salvar();
}

function resultado(msg) {
  document.getElementById("resultado").innerText = msg;
}

window.onload = () => {
  let userSalvo = localStorage.getItem("usuario");
  if (userSalvo) {
    document.getElementById("user").value = userSalvo;
    entrar();
  }
}
</script>

</body>
</html>
